<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Vercel Analytics -->
    <script src="https://analytics.vercel.com/script.js" defer></script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selyna</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(145deg, #ffd6e7, #ffe9f2);
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        .profile-img {
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="min-h-screen text-neutral-800">
    <div class="max-w-md mx-auto bg-white/80 backdrop-blur-lg min-h-screen pb-12">
        <!-- Profile Section -->
        <div class="pt-12 pb-6 text-center">
            <div class="w-40 h-40 mx-auto rounded-full overflow-hidden border-4 border-white shadow-xl profile-img">
                <img src="https://i.postimg.cc/02r7zgKx/stick-tounge-out-2K-202605232030.jpg"
                     alt="Selyna"
                     class="w-full h-full object-cover">
            </div>
            <h1 class="text-4xl font-serif mt-6 text-neutral-900">Selyna</h1>
            <p class="text-neutral-500 mt-1">@Nurse_Selyna</p>
            <p class="italic text-neutral-600 mt-3 text-lg">"more of me"</p>
        </div>

        <!-- Buttons -->
        <div class="px-6 space-y-3">
            <!-- Exclusive Content -->
            <a href="https://www.fanvue.com/zheng" 
               class="block bg-white border border-neutral-200 rounded-2xl p-4 flex items-center gap-4 hover:bg-neutral-50 transition-all active:scale-95">
                <div class="w-10 h-10 bg-neutral-100 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-lock text-xl text-neutral-700"></i>
                </div>
                <div class="flex-1">
                    <span class="font-medium text-lg">exclusive content</span>
                </div>
                <span class="bg-purple-500 text-white text-xs font-medium px-3 py-1 rounded-xl">18+</span>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/nurse_selyna" target="_blank"
               class="block bg-white border border-neutral-200 rounded-2xl p-4 flex items-center gap-4 hover:bg-neutral-50 transition-all active:scale-95">
                <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-orange-500 rounded-xl flex items-center justify-center text-white">
                    <i class="fa-brands fa-instagram text-2xl"></i>
                </div>
                <span class="font-medium text-lg flex-1">Instagram</span>
            </a>
        </div>

        <!-- Footer -->
        <div class="mt-12 px-6 text-center">
            <div class="flex items-center justify-center gap-2 text-neutral-500 text-sm">
                <i class="fa-solid fa-globe"></i>
                <span>Open in your browser</span>
            </div>
            <p class="text-xs text-neutral-400 mt-1">For the best experience & to access content</p>
            
            <button onclick="alert('Link copied! Share this page with your fans 💕')"
                    class="mt-6 w-full bg-neutral-900 text-white py-3.5 rounded-2xl font-medium active:scale-95 transition-all">
                Open
            </button>
        </div>

        <div class="text-center text-neutral-400 text-xs mt-10 pb-6">
            SELYNA
        </div>
    </div>
</body>
</html>
