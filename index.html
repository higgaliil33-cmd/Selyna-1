<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://analytics.vercel.com/script.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selyna</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(145deg, #ffd6e7, #ffe9f2);
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        .hero-img {
            height: 420px;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        
        .hero-container:hover .hero-img {
            transform: scale(1.08);
        }
        
        .social-icon {
            transition: all 0.3s ease;
        }
        
        .social-icon:hover {
            transform: scale(1.3) rotate(8deg);
        }
        
        .card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="min-h-screen text-neutral-800 pb-12">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl overflow-hidden">

        <!-- Hero Section -->
        <div class="hero-container relative">
            <img id="heroImage" 
                 src="https://i.postimg.cc/02r7zgKx/stick-tounge-out-2K-202605232030.jpg" 
                 alt="Selyna"
                 class="hero-img w-full">

            <div class="absolute bottom-8 left-0 right-0 text-center">
                <h1 id="name" class="text-4xl font-bold text-white drop-shadow-xl">Selyna</h1>
                <p id="username" class="text-white/90 text-xl mt-1">@nurse_selyna</p>
            </div>
        </div>

        <!-- Social Icons -->
        <div class="flex justify-center gap-8 py-8 bg-white">
            <a href="https://www.instagram.com/nurse_selyna" target="_blank" class="social-icon text-pink-600">
                <i class="fa-brands fa-instagram text-5xl"></i>
            </a>
        </div>

        <!-- Main Links -->
        <div class="px-6 space-y-4 pb-12">
            
            <!-- Exclusive Content -->
            <a href="https://www.fanvue.com/zheng" target="_blank"
               class="card block bg-white border border-neutral-200 rounded-3xl p-5 flex items-center gap-4 hover:bg-neutral-50">
                <div class="w-12 h-12 bg-purple-100 rounded-2xl flex items-center justify-center text-2xl">
                    🔒
                </div>
                <div class="flex-1">
                    <span class="font-semibold text-xl">Exclusive Content</span>
                    <p class="text-neutral-500 text-sm">18+</p>
                </div>
                <span class="text-purple-600">
                    <i class="fa-solid fa-arrow-right text-2xl"></i>
                </span>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/nurse_selyna" target="_blank"
               class="card block bg-white border border-neutral-200 rounded-3xl p-5 flex items-center gap-4 hover:bg-neutral-50">
                <div class="w-12 h-12 bg-gradient-to-br from-pink-500 via-purple-500 to-orange-500 rounded-2xl flex items-center justify-center text-white">
                    <i class="fa-brands fa-instagram text-3xl"></i>
                </div>
                <div class="flex-1">
                    <span class="font-semibold text-xl">Instagram</span>
                </div>
                <span class="text-pink-500">
                    <i class="fa-solid fa-arrow-right text-2xl"></i>
                </span>
            </a>

        </div>

        <div class="text-center text-neutral-400 text-xs pb-8">
            SELYNA
        </div>
    </div>

</body>
</html>
