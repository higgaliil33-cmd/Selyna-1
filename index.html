<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://analytics.vercel.com/script.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selyna</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        .background-img {
            background-image: url('https://i.postimg.cc/02r7zgKx/stick-tounge-out-2K-202605232030.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(20px) brightness(0.7);
            z-index: -1;
        }
        
        .profile-img {
            width: 160px;
            height: 160px;
            object-fit: cover;
            transition: transform 0.5s ease;
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.3);
        }
        
        .profile-container:hover .profile-img {
            transform: scale(1.08);
        }
        
        .main-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .main-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 40px -15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="min-h-screen text-neutral-800 relative">

    <!-- Blurred Background -->
    <div class="background-img fixed inset-0"></div>

    <div class="max-w-md mx-auto relative min-h-screen flex flex-col items-center pt-12 pb-20 px-6">

        <!-- Profile Picture -->
        <div class="profile-container mb-8">
            <div class="rounded-3xl overflow-hidden border-4 border-white/90 bg-white">
                <img id="profileImage" 
                     src="https://i.postimg.cc/02r7zgKx/stick-tounge-out-2K-202605232030.jpg" 
                     alt="Selyna"
                     class="profile-img">
            </div>
        </div>

        <!-- Name -->
        <h1 id="name" class="text-5xl font-bold text-white drop-shadow-xl text-center">Selyna</h1>
        <p id="username" class="text-white/80 text-xl mt-1 mb-12">@nurse_selyna</p>

        <!-- Exclusive Content Card -->
        <a href="https://www.fanvue.com/zheng" target="_blank"
           class="main-card w-full bg-white/95 backdrop-blur-xl border border-white/50 rounded-3xl p-8 flex items-center gap-6 hover:bg-white">
            
            <div class="w-24 h-24 flex-shrink-0 rounded-2xl overflow-hidden border-2 border-purple-200">
                <img src="https://i.postimg.cc/02r7zgKx/stick-tounge-out-2K-202605232030.jpg" 
                     alt="Exclusive" 
                     class="w-full h-full object-cover">
            </div>

            <div class="flex-1">
                <span class="font-bold text-2xl block text-neutral-900">Exclusive Content</span>
                <p class="text-purple-600 font-medium mt-1">18+ • Private Photos & Videos</p>
                <p class="text-neutral-500 text-sm mt-3">Only for true fans 💕</p>
            </div>

            <span class="text-4xl text-purple-500">→</span>
        </a>

        <div class="mt-auto text-center text-white/60 text-xs pt-16">
            SELYNA
        </div>
    </div>

</body>
</html>
